name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"   # v0.1.0, v1.2.3-rc1, …

permissions:
  contents: write   # needed to create GitHub Releases

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: sentinel-linux-amd64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: sentinel-macos-amd64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: sentinel-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Chromium (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y chromium-browser

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/sentinel
          ARCHIVE=${{ matrix.artifact }}.tar.gz
          tar czf "$ARCHIVE" -C "$(dirname $BIN)" "$(basename $BIN)"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Compute checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -exec sha256sum {} \; > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Sentinel ${{ github.ref_name }}
          body: |
            ## Sentinel ${{ github.ref_name }}

            CERT-grade web vulnerability scanner.

            ### Installation
            ```bash
            tar xzf sentinel-linux-amd64.tar.gz
            chmod +x sentinel
            sudo mv sentinel /usr/local/bin/
            ```

            ### Checksums
            See `SHA256SUMS` in this release.
          files: |
            artifacts/**/*.tar.gz
            artifacts/SHA256SUMS
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
